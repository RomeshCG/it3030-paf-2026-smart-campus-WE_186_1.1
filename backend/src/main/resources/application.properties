spring.application.name=smart-campus-backend

# ==================== Database ====================
# TEMPORARY: Using H2 in-memory DB so you can see the app running without your MySQL password.
# To switch to MySQL, comment out H2 and uncomment the MySQL lines.

# H2 Configuration
spring.datasource.url=jdbc:h2:mem:smart_campus
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MySQL Configuration
# spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=8080
