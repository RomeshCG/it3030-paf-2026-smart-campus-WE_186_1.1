spring.application.name=smart-campus-backend

# ==================== H2 In-Memory DB (local dev) ====================
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# ==================== JWT ====================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ==================== Google OAuth2 ====================
google.client-id=${GOOGLE_CLIENT_ID}

# ==================== CORS ====================
app.cors.allowed-origin=http://localhost:5176
